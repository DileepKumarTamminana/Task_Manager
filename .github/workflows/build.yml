name: Build Test Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write   # lets CodeQL upload results to the Security tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # --- Security scan: initialize BEFORE the build so it can trace compilation ---
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # --- Build + Test ---
      - name: Build and test
        run: mvn -B verify

      # --- Security scan: analyze the compiled code ---
      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

      # --- Save the built JAR ---
      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: error
