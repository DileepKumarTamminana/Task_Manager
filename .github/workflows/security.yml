name: Vul check pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# CodeQL needs security-events: write to upload results to the Security tab.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL SAST scan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'          # matches pom.xml <java.version>
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # CodeQL traces this build to analyze the compiled bytecode.
      - name: Build project
        run: mvn -B -DskipTests clean package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  snyk:
    name: Snyk dependency scan
    runs-on: ubuntu-22.04
    # Report, don't fail: never block the pipeline on this job.
    continue-on-error: true
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Runs only if SNYK_TOKEN is configured; otherwise skipped so the
      # pipeline stays green even without a Snyk account.
      - name: Snyk vulnerability scan
        if: ${{ env.SNYK_TOKEN != '' }}
        continue-on-error: true
        uses: snyk/actions/maven@master
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk.sarif
          if-no-files-found: warn
